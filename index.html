<!DOCTYPE html>
<html lang="en">
<head>        
        <!--定义HTML文档的开始，像是文档的字符编码以及标题都涵盖其中，以下标签可用在 head 部分：
            <base>, <link>, <meta>, <script>, <style>, 以及 <title>（它是必需有的，因为它将在页面展示）。这些被描述的标签不会展示给阅读者，只是作为数据记录。-->
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
        <!--<meta name="Description" content="hi，我是灰草草。">
            description,描述，可以在网页搜索中定义到-->
            <!--<meta http-equiv="refresh" content="3;网址">这是一个跳转的定义：意为几秒之后跳转至“网址”
                <meta name="Keywords" content="灰草草,奇幻,写作,小说" />这与上面的类似，但定义的是关键词，且因为GitHub屏蔽了百度爬虫，所以不主动提交是搜不到的（谷歌同理）-->
    <title>灰草草</title><!--这是一个标题，用以显示在浏览器的标签页上-->
    @font

        {

        }
        p.flower

        }
        h5.目录
        {
            color:darkgray;
        }
        </style>
</head>
