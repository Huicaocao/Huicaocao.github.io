<body>
    <blockquote>
        静谧之所。
        我将要向你描述一个并不存在此刻，亦不存在他处的场景，它首先轻若一片绒羽，有着细长而软糯的暖意，因为我曾那样近地瞧看它，我的眼便在这其中的每一刻流泪。
        冰凉的一瞬掠影，用海盐侵蚀礁石的方式啃食贫苦者，从最为细微的角度切入，像平刀涂抹石膏那样，剐蹭抹平人性的棱角，将善意摒除。
        
    </blockquote>
